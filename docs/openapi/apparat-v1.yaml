openapi: 3.1.0
info:
  title: Apparat API
  version: 0.1.0
servers:
  - url: https://apparat.local
security:
  - mutualTLS: []
paths:
  /v1/health:
    get:
      summary: Health and readiness
      responses:
        "200":
          description: Device health
  /v1/device:
    get:
      summary: Authenticated device record
      responses:
        "200":
          description: Device identity, roles, and trust
  /v1/capabilities:
    get:
      summary: Typed workload capabilities
      responses:
        "200":
          description: Capabilities for text, image, video, STT, TTS, BOINC, and future classes
  /v1/projects:
    get:
      summary: List projects authoritatively owned by this device
      responses:
        "200":
          description: Authorized owner-local project summaries; callers merge owners into a cluster-wide catalog
  /v1/projects/{project_id}:
    get:
      summary: Get an owner-local project summary
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Authorized project summary and availability
  /v1/projects/{project_id}/tasks:
    get:
      summary: List Apparat Task entrypoints for an owned project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Task entrypoints and trigger summaries; the project is a Pipeline when this list is non-empty
  /v1/projects/{project_id}/tasks/{task_id}/runs:
    post:
      summary: Manually request execution of a project Task entrypoint
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/TaskID"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Task run accepted by the project owner
          headers:
            Location:
              schema:
                type: string
  /v1/jobs:
    post:
      summary: Submit an asynchronous workload job
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Job accepted
          headers:
            Location:
              schema:
                type: string
  /v1/jobs/{id}:
    get:
      summary: Get job state
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Job state
  /v1/jobs/{id}/cancel:
    post:
      summary: Cancel a job
      parameters:
        - $ref: "#/components/parameters/ID"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Cancellation accepted
  /v1/queues/{queue_id}/jobs:
    post:
      summary: Submit a job to the authoritative queue owner
      parameters:
        - $ref: "#/components/parameters/QueueID"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Queue owner validated, persisted, and accepted the job
          headers:
            Location:
              schema:
                type: string
  /v1/queues/{queue_id}/claims:
    post:
      summary: Poll or long-poll the queue owner for a compatible worker lease
      parameters:
        - $ref: "#/components/parameters/QueueID"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: One bounded lease selected by the queue owner
        "204":
          description: No compatible work is currently available
  /v1/queues/{queue_id}/leases/{lease_id}/heartbeat:
    post:
      summary: Renew or report bounded progress for an active worker lease
      parameters:
        - $ref: "#/components/parameters/QueueID"
        - $ref: "#/components/parameters/LeaseID"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Heartbeat accepted by the queue owner
  /v1/queues/{queue_id}/leases/{lease_id}/complete:
    post:
      summary: Submit a signed terminal result or failure to the queue owner
      parameters:
        - $ref: "#/components/parameters/QueueID"
        - $ref: "#/components/parameters/LeaseID"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Result accepted for authoritative validation and idempotent completion
  /v1/events:
    get:
      summary: Cursor-based long polling
      parameters:
        - name: after
          in: query
          schema:
            type: string
        - name: wait
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Event page
  /v1/project-transactions:
    post:
      summary: Submit an owner-authoritative project transaction
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Transaction accepted
components:
  securitySchemes:
    mutualTLS:
      type: mutualTLS
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
    ProjectID:
      name: project_id
      in: path
      required: true
      schema:
        type: string
    TaskID:
      name: task_id
      in: path
      required: true
      schema:
        type: string
    QueueID:
      name: queue_id
      in: path
      required: true
      schema:
        type: string
    LeaseID:
      name: lease_id
      in: path
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
  schemas:
    WorkloadClass:
      type: string
      enum:
        - text_generation
        - image_generation
        - video_generation
        - speech_to_text
        - text_to_speech
        - research_boinc
