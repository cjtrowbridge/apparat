<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="512"
     height="512"
     viewBox="0 0 512 512"
     role="img"
     aria-labelledby="title desc">
  <title id="title">Simple blue eight-tooth gear</title>
  <desc id="desc">A blue gear with eight square teeth surrounding an empty white circle.</desc>

  <rect width="512" height="512" fill="#ffffff"/>

  <g fill="#0066ff">
    <!-- Solid gear body -->
    <circle cx="256" cy="256" r="148"/>

    <!-- Cardinal teeth -->
    <rect x="224" y="40" width="64" height="100"/>
    <rect x="224" y="372" width="64" height="100"/>
    <rect x="372" y="224" width="100" height="64"/>
    <rect x="40" y="224" width="100" height="64"/>

    <!-- Diagonal teeth moved inward to overlap the body -->
    <rect x="337" y="75" width="64" height="100"
          transform="rotate(45 369 125)"/>
    <rect x="111" y="75" width="64" height="100"
          transform="rotate(-45 143 125)"/>
    <rect x="337" y="337" width="64" height="100"
          transform="rotate(-45 369 387)"/>
    <rect x="111" y="337" width="64" height="100"
          transform="rotate(45 143 387)"/>
  </g>

  <!-- Empty white center -->
  <circle cx="256" cy="256" r="76" fill="#ffffff"/>
</svg>
